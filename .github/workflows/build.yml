name: Build Northstar

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1

      # Find ONLY top-level solution (ignore thirdparty entirely)
      - name: Find Northstar solution
        id: find_sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln |
            Where-Object { $_.FullName -notmatch "thirdparty|libcurl|VC10" } |
            Select-Object -First 1

          if (-not $sln) {
            Write-Error "No valid Northstar solution found"
            exit 1
          }

          echo "solution=$($sln.FullName)" >> $env:GITHUB_OUTPUT

      # CRITICAL FIX: do NOT build project references (this is what drags in curl)
      - name: Build ONLY Northstar (no dependency traversal)
        run: msbuild "${{ steps.find_sln.outputs.solution }}" `
          /p:Configuration=Release `
          /p:Platform=Win32 `
          /m `
          /p:BuildProjectReferences=false `
          /p:ResolveReferences=false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: northstar-build
          path: |
            **\bin\Release\*
            **\Release\*