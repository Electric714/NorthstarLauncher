name: Build Northstar

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Visual Studio build environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Find solution file
        id: find_sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) {
            Write-Error "No .sln file found in repo"
            exit 1
          }
          echo "solution=$($sln.FullName)" >> $env:GITHUB_OUTPUT

      - name: Build solution (Win32 fix)
        run: msbuild "${{ steps.find_sln.outputs.solution }}" /p:Configuration=Release /p:Platform=Win32 /m

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: northstar-build
          path: |
            **\bin\Release\*
            **\Release\*