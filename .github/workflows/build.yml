name: Build Northstar

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1

      # STEP 1: DEBUG - show all solution files
      - name: List all solution files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.sln | ForEach-Object { $_.FullName }

      # STEP 2: capture FIRST real solution file
      - name: Find solution file
        id: find_sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1

          if (-not $sln) {
            Write-Error "No .sln file found anywhere in repo"
            exit 1
          }

          echo "solution=$($sln.FullName)" >> $env:GITHUB_OUTPUT

      # STEP 3: build it
      - name: Build solution
        run: msbuild "${{ steps.find_sln.outputs.solution }}" /p:Configuration=Release /p:Platform=Win32 /m

      # STEP 4: upload output
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: northstar-build
          path: |
            **\bin\Release\*
            **\Release\*