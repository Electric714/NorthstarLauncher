name: Build NorthstarLauncher

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1

      # DEBUG STEP (shows actual project structure once)
      - name: Show repo contents
        shell: pwsh
        run: |
          Get-ChildItem -Recurse | Select-Object FullName

      # BUILD STEP (safe fallback)
      - name: Build project (auto-detect)
        shell: pwsh
        run: |
          $proj = Get-ChildItem -Recurse -Include *.vcxproj,*.sln | Select-Object -First 1

          if (-not $proj) {
            Write-Error "No buildable project found (.vcxproj or .sln missing)"
            exit 1
          }

          msbuild $proj.FullName /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NorthstarLauncher
          path: |
            **\Release\*
            **\bin\Release\*